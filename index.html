<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardCash Agency Instant</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(180deg,#1d4ed8,#22c55e);
min-height:100vh;
}

header{
background:#1d4ed8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang img{
width:35px;
margin-left:5px;
cursor:pointer;
}

h1{color:white;margin-top:20px;}

.download{
display:inline-block;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:10px;
margin:15px;
font-size:18px;
text-decoration:none;
}

.cards img{width:70px;margin:10px;}

.counter{
background:white;
padding:15px;
margin:20px;
border-radius:15px;
font-size:20px;
font-weight:bold;
color:#16a34a;
}

form{
background:#f5f5f5;
margin:20px auto;
padding:20px;
border-radius:15px;
max-width:400px;
display:flex;
flex-direction:column;
gap:10px;
align-items:center;
}

input,select,button{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#16a34a;
color:white;
border:none;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.upload{
border:2px dashed green;
padding:20px;
border-radius:10px;
margin:10px 0;
background:white;
text-align:left;
}

footer{
background:#1d4ed8;
color:white;
padding:20px;
margin-top:20px;
}

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
z-index:1000;
}

.whatsapp img{
width:32px;
}
</style>

<script>
// PAYMENT DISPLAY
function showPayment(){
let method=document.getElementById("payment").value;
["paypal","momo","orange","card"].forEach(id=>{
document.getElementById(id).style.display="none";
});
if(method) document.getElementById(method).style.display="block";
}

// LANGUAGE
function setLang(lang){
localStorage.setItem("lang",lang);
applyLang();
}

function applyLang(){
let lang = localStorage.getItem("lang") || navigator.language;

if(lang.startsWith("fr")){
document.getElementById("title").innerText="Nous achetons vos cartes cadeaux instantanément";
document.getElementById("clients").innerText="Plus de 1500 clients satisfaits";
document.getElementById("sell").innerText="Vendre ma carte";
document.getElementById("btn").innerText="Envoyer";
document.getElementById("commission").innerText="10% de commission";
document.getElementById("downloadBtn").innerText="Télécharger l'application";
document.getElementById("footerText").innerText="Support WhatsApp : +13434473483";

document.getElementById("name").placeholder="Nom";
document.getElementById("firstname").placeholder="Prénom";
document.getElementById("email").placeholder="Email";
document.getElementById("value").placeholder="Valeur de la carte";

document.getElementById("payment").options[0].text="Choisir méthode de paiement";
document.getElementById("payment").options[1].text="PayPal";
document.getElementById("payment").options[2].text="MoMo";
document.getElementById("payment").options[3].text="Orange Money";
document.getElementById("payment").options[4].text="Carte bancaire";

document.getElementById("paypalInput").placeholder="Lien PayPal";
document.getElementById("momoInput").placeholder="Numéro MoMo";
document.getElementById("orangeInput").placeholder="Numéro Orange Money";
document.getElementById("cardInput").placeholder="Numéro carte bancaire";

document.getElementById("uploadLabel").innerText="Télécharger la photo de la carte";

}else{
document.getElementById("title").innerText="We buy your gift cards instantly";
document.getElementById("clients").innerText="Over 1500 satisfied clients";
document.getElementById("sell").innerText="Sell my gift card";
document.getElementById("btn").innerText="Send";
document.getElementById("commission").innerText="10% commission";
document.getElementById("downloadBtn").innerText="Download App";
document.getElementById("footerText").innerText="WhatsApp customer support : +13434473483";

document.getElementById("name").placeholder="Name";
document.getElementById("firstname").placeholder="First name";
document.getElementById("email").placeholder="Email";
document.getElementById("value").placeholder="Card value";

document.getElementById("payment").options[0].text="Choose payment method";
document.getElementById("payment").options[1].text="PayPal";
document.getElementById("payment").options[2].text="MoMo";
document.getElementById("payment").options[3].text="Orange Money";
document.getElementById("payment").options[4].text="Bank card";

document.getElementById("paypalInput").placeholder="PayPal payment link";
document.getElementById("momoInput").placeholder="MoMo number";
document.getElementById("orangeInput").placeholder="Orange Money number";
document.getElementById("cardInput").placeholder="Bank card number";

document.getElementById("uploadLabel").innerText="Upload gift card photo";
}
}

// WHATSAPP SEND
function sendWhatsApp(){
let lang = localStorage.getItem("lang") || "en";

let name=document.getElementById("name").value;
let firstname=document.getElementById("firstname").value;
let email=document.getElementById("email").value;
let value=document.getElementById("value").value;
let payment=document.getElementById("payment").value;

let paymentInfo="";
if(payment=="paypal") paymentInfo=document.getElementById("paypalInput").value;
if(payment=="momo") paymentInfo=document.getElementById("momoInput").value;
if(payment=="orange") paymentInfo=document.getElementById("orangeInput").value;
if(payment=="card") paymentInfo=document.getElementById("cardInput").value;

let msg="";
if(lang.startsWith("fr")){
msg=`Nom: ${name}%0APrénom: ${firstname}%0AEmail: ${email}%0AValeur: ${value}%0APaiement: ${payment}%0ADétail: ${paymentInfo}%0A%0AEnvoyez la photo de la carte ici`;
}else{
msg=`Name: ${name}%0AFirst name: ${firstname}%0AEmail: ${email}%0ACard value: ${value}%0APayment: ${payment}%0ADetail: ${paymentInfo}%0A%0ASend the gift card photo here`;
}

window.open("https://wa.me/13434473483?text="+msg,"_blank");
}

window.onload=applyLang;
</script>
</head>

<body>

<header>
<span>CardCash Agency Instant</span>
<div class="lang">
<img src="https://flagcdn.com/w40/fr.png" onclick="setLang('fr')">
<img src="https://flagcdn.com/w40/gb.png" onclick="setLang('en')">
</div>
</header>

<h1 id="title">We buy your gift cards instantly</h1>

<a class="download" id="downloadBtn" href="app.apk" download>Download App</a>

<div class="cards">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg">
</div>

<div class="counter" id="clients">Over 1500 satisfied clients</div>

<h2 id="sell">Sell my gift card</h2>
<p id="commission">10% commission</p>

<form>
<input type="text" id="name" required>
<input type="text" id="firstname" required>
<input type="email" id="email" required>
<input type="number" id="value" required>

<select id="payment" onchange="showPayment()" required>
<option value="">Choose payment method</option>
<option value="paypal">PayPal</option>
<option value="momo">MoMo</option>
<option value="orange">Orange Money</option>
<option value="card">Bank card</option>
</select>

<div id="paypal" style="display:none"><input type="text" id="paypalInput"></div>
<div id="momo" style="display:none"><input type="text" id="momoInput"></div>
<div id="orange" style="display:none"><input type="text" id="orangeInput"></div>
<div id="card" style="display:none"><input type="text" id="cardInput"></div>

<div class="upload">
<label id="uploadLabel">Upload gift card photo</label>
<input type="file" accept="image/*" capture="environment">
</div>

<button type="button" id="btn" onclick="sendWhatsApp()">Send</button>
</form>

<footer id="footerText">WhatsApp customer support : +13434473483</footer>

<a class="whatsapp" href="https://wa.me/13434473483">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</body>
</html>
