<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardCash Agency Instant</title>

<style>
body{margin:0;font-family:Arial;text-align:center;background:linear-gradient(180deg,#1d4ed8,#22c55e,#facc15,#f97316);}

/*  Header corrigé (espace ajouté à droite) */
header{
background:#1d4ed8;
color:white;
padding:15px 80px 15px 15px;
font-size:22px;
font-weight:bold;
position:relative;
}

.lang{position:absolute;right:10px;top:10px;}
.lang img{width:35px;margin-left:5px;cursor:pointer;}

h1{color:white;margin-top:20px;}
.download{display:inline-block;background:#16a34a;color:white;padding:12px 20px;border-radius:10px;margin:15px;font-size:18px;text-decoration:none;}
.cards img{width:70px;margin:10px;}
.counter{background:white;padding:15px;margin:20px;border-radius:15px;font-size:20px;font-weight:bold;color:#16a34a;}
form{background:#f5f5f5;margin:20px;padding:20px;border-radius:15px;}
input,select{width:100%;padding:14px;margin:10px 0;border-radius:10px;border:1px solid #ccc;font-size:16px;}
button{background:#16a34a;color:white;border:none;padding:15px;width:100%;font-size:18px;border-radius:10px;cursor:pointer;}
.upload{border:2px dashed green;padding:20px;border-radius:10px;margin:10px 0;background:white;}
footer{background:#1d4ed8;color:white;padding:20px;margin-top:20px;}

/*  WhatsApp corrigé */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
z-index:1000;
}
.whatsapp img{
width:32px;
height:32px;
}
</style>

<script>
function showPayment(){
  let method=document.getElementById("payment").value;
  document.getElementById("paypal").style.display="none";
  document.getElementById("momo").style.display="none";
  document.getElementById("orange").style.display="none";
  document.getElementById("card").style.display="none";
  if(method=="paypal") document.getElementById("paypal").style.display="block";
  if(method=="momo") document.getElementById("momo").style.display="block";
  if(method=="orange") document.getElementById("orange").style.display="block";
  if(method=="card") document.getElementById("card").style.display="block";
}

function langFR(){
  document.getElementById("title").innerText="Nous achetons vos cartes cadeaux instantanément";
  document.getElementById("downloadApp").innerText=" Télécharger l'application";
  document.getElementById("sell").innerText="Vendre ma carte cadeau";
  document.getElementById("commission").innerText="10% commission";
  document.getElementById("btn").innerText="Vendre";
  document.getElementById("name").placeholder="Nom";
  document.getElementById("firstname").placeholder="Prénom";
  document.getElementById("email").placeholder="Email";
  document.getElementById("value").placeholder="Valeur de la carte";
  document.getElementById("paypalInput").placeholder="Lien PayPal";
  document.getElementById("momoInput").placeholder="Numéro MoMo";
  document.getElementById("orangeInput").placeholder="Numéro Orange Money";
  document.getElementById("cardInput").placeholder="Numéro carte bancaire";
  document.getElementById("clients").innerText=" Plus de 1500 clients satisfaits";
}

function langEN(){
  document.getElementById("title").innerText="We buy your gift cards instantly";
  document.getElementById("downloadApp").innerText=" Download App";
  document.getElementById("sell").innerText="Sell my gift card";
  document.getElementById("commission").innerText="10% commission";
  document.getElementById("btn").innerText="Sell";
  document.getElementById("name").placeholder="Name";
  document.getElementById("firstname").placeholder="First name";
  document.getElementById("email").placeholder="Email";
  document.getElementById("value").placeholder="Card value";
  document.getElementById("paypalInput").placeholder="PayPal payment link";
  document.getElementById("momoInput").placeholder="MoMo number";
  document.getElementById("orangeInput").placeholder="Orange Money number";
  document.getElementById("cardInput").placeholder="Bank card number";
  document.getElementById("clients").innerText=" Over 1500 satisfied clients";
}
</script>

</head>

<body>

<header>
CardCash Agency Instant
<div class="lang">
<img src="https://flagcdn.com/w40/fr.png" onclick="langFR()">
<img src="https://flagcdn.com/w40/gb.png" onclick="langEN()">
</div>
</header>

<h1 id="title">We buy your gift cards instantly</h1>

<a id="downloadApp" class="download" href="app.apk" download>
 Download App
</a>

<div class="cards">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg">
</div>

<div class="counter" id="clients">
 Over 1500 satisfied clients
</div>

<h2 id="sell">Sell my gift card</h2>

<p id="commission">10% commission</p>

<form>
<input type="text" id="name" placeholder="Name">
<input type="text" id="firstname" placeholder="First name">
<input type="email" id="email" placeholder="Email">
<input type="number" id="value" placeholder="Card value">

<select id="payment" onchange="showPayment()">
<option>Choose payment method</option>
<option value="paypal">PayPal</option>
<option value="momo">MoMo</option>
<option value="orange">Orange Money</option>
<option value="card">Bank card</option>
</select>

<div id="paypal" style="display:none">
<input type="text" id="paypalInput" placeholder="PayPal payment link">
</div>

<div id="momo" style="display:none">
<input type="text" id="momoInput" placeholder="MoMo number">
</div>

<div id="orange" style="display:none">
<input type="text" id="orangeInput" placeholder="Orange Money number">
</div>

<div id="card" style="display:none">
<input type="text" id="cardInput" placeholder="Bank card number">
</div>

<div class="upload">
 Upload gift card photo
<input type="file">
</div>

<button id="btn">Sell</button>
</form>

<footer>
WhatsApp customer support : +13434473483
</footer>

<a class="whatsapp" href="https://wa.me/13434473483">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</body>
</html>
