<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardCash Agency</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(180deg,#1d4ed8,#22c55e);
}

/* HEADER */
header{
background:#1d4ed8;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang img{
width:30px;
cursor:pointer;
margin-left:5px;
}

/* TEXT */
h1{color:white;margin-top:20px;padding:10px;}

.download{
display:inline-block;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:10px;
margin:15px;
font-size:18px;
text-decoration:none;
}

/* LOGOS */
.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
}
.cards img{
width:60px;
margin:10px;
}

/* COUNTER */
.counter{
background:white;
padding:15px;
margin:20px;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:#16a34a;
}

/* FORM */
form{
background:#f5f5f5;
margin:20px auto;
padding:20px;
border-radius:15px;
max-width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select,button{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#16a34a;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

/* UPLOAD */
.upload{
border:2px dashed green;
padding:15px;
border-radius:10px;
background:white;
font-size:14px;
}

/* FOOTER */
footer{
background:#1d4ed8;
color:white;
padding:15px;
margin-top:20px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.whatsapp img{
width:30px;
}

/* RESPONSIVE */
@media(max-width:500px){
h1{font-size:20px;}
}
</style>

<script>
// LANGUE
function setLang(lang){
localStorage.setItem("lang",lang);
translate(lang);
}

function detectLang(){
let lang = localStorage.getItem("lang");
if(!lang){
lang = navigator.language.startsWith("fr") ? "fr" : "en";
}
translate(lang);
}

function translate(lang){
if(lang=="fr"){
document.getElementById("title").innerText="Nous achetons vos cartes cadeaux instantanément";
document.getElementById("sell").innerText="Vendre ma carte";
document.getElementById("commission").innerText="10% de commission";
document.getElementById("btn").innerText="Vendre";
document.getElementById("clients").innerText="Plus de 1500 clients satisfaits";
}
else{
document.getElementById("title").innerText="We buy your gift cards instantly";
document.getElementById("sell").innerText="Sell my gift card";
document.getElementById("commission").innerText="10% commission";
document.getElementById("btn").innerText="Sell";
document.getElementById("clients").innerText="Over 1500 satisfied clients";
}
}

// PAYMENT
function showPayment(){
let method=document.getElementById("payment").value;
["paypal","momo","orange","card"].forEach(id=>{
document.getElementById(id).style.display="none";
});
if(method) document.getElementById(method).style.display="block";
}

window.onload=detectLang;
</script>

</head>

<body>

<header>
<div>CardCash Agency</div>

<div class="lang">
<img src="https://flagcdn.com/w40/fr.png" onclick="setLang('fr')">
<img src="https://flagcdn.com/w40/gb.png" onclick="setLang('en')">
</div>
</header>

<h1 id="title">We buy your gift cards instantly</h1>

<a class="download" href="#">Download App</a>

<div class="cards">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
